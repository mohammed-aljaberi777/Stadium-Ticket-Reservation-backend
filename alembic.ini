[alembic]
# Folder that holds the migration environment and versions
script_location = alembic

# Make the project root importable so "from app.models import Base" works
prepend_sys_path = .

# The database URL is set programmatically in env.py from app settings,
# so we leave it blank here.
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
